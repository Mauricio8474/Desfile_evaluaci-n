{% extends "base.html" %}
{% block title %}Estudiantes - Administraci&oacute;n{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0"><i class="bi bi-people-fill me-2 text-usm"></i>Estudiantes</h3>
    <div>
        <a href="{{ url_for('admin_estudiantes_cargar') }}" class="btn btn-outline-usm me-1"><i class="bi bi-upload"></i> Cargar Excel</a>
        <a href="{{ url_for('admin_estudiante_nuevo') }}" class="btn btn-usm"><i class="bi bi-plus-lg"></i> Nuevo estudiante</a>
    </div>
</div>

<div class="card border-0 shadow-sm mb-4">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>#</th><th>C&oacute;digo</th><th>Nombre</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                {% for e in estudiantes %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td><span class="badge bg-light text-dark">{{ e.codigo }}</span></td>
                    <td class="fw-medium">{{ e.nombre }}</td>
                    <td>
                        <a href="{{ url_for('admin_estudiante_editar', estudiante_id=e.id) }}" class="btn btn-sm btn-outline-usm"><i class="bi bi-pencil"></i></a>
                        <form method="POST" action="{{ url_for('admin_estudiante_eliminar', estudiante_id=e.id) }}" class="d-inline" onsubmit="return confirm('Eliminar a {{ e.nombre }}?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
