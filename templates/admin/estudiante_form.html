{% extends "base.html" %}
{% block title %}{{ 'Editar' if estudiante else 'Nuevo' }} Estudiante - Administraci&oacute;n{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-4">{{ 'Editar' if estudiante else 'Nuevo' }} Estudiante</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" name="nombre" class="form-control form-control-lg" value="{{ estudiante.nombre if estudiante else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">C&oacute;digo *</label>
                        <input type="text" name="codigo" class="form-control form-control-lg" value="{{ estudiante.codigo if estudiante else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Grupo</label>
                        <select name="grupo_id" class="form-select form-select-lg">
                            <option value="">— Sin grupo —</option>
                            {% for g in grupos %}
                            <option value="{{ g.id }}" {{ 'selected' if estudiante and estudiante.grupo_id == g.id else '' }}>{{ g.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin_estudiantes') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-usm"><i class="bi bi-check-circle"></i> {{ 'Actualizar' if estudiante else 'Crear' }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
