{% extends "base.html" %}
{% block title %}{{ 'Editar' if grupo else 'Nuevo' }} Grupo - Administraci&oacute;n{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-4">{{ 'Editar' if grupo else 'Nuevo' }} Grupo</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre del grupo *</label>
                        <input type="text" name="nombre" class="form-control form-control-lg" value="{{ grupo.nombre if grupo else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripci&oacute;n</label>
                        <textarea name="descripcion" class="form-control" rows="3">{{ grupo.descripcion if grupo else '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin_grupos') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-usm"><i class="bi bi-check-circle"></i> {{ 'Actualizar' if grupo else 'Crear' }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
