{% extends "base.html" %}
{% block title %}Grupos - Administraci&oacute;n{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0"><i class="bi bi-layer-group me-2 text-usm"></i>Grupos</h3>
    <a href="{{ url_for('admin_grupo_nuevo') }}" class="btn btn-usm"><i class="bi bi-plus-lg"></i> Nuevo grupo</a>
</div>

<div class="card border-0 shadow-sm">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-usm">
                <tr><th>#</th><th>Nombre</th><th>Descripci&oacute;n</th><th>Estudiantes</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                {% for g in grupos %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td class="fw-medium">{{ g.nombre }}</td>
                    <td>{{ g.descripcion or '—' }}</td>
                    <td><span class="badge bg-earth">{{ g.estudiantes|length }}</span></td>
                    <td>
                        <a href="{{ url_for('admin_grupo_editar', grupo_id=g.id) }}" class="btn btn-sm btn-outline-usm"><i class="bi bi-pencil"></i></a>
                        <form method="POST" action="{{ url_for('admin_grupo_eliminar', grupo_id=g.id) }}" class="d-inline" onsubmit="return confirm('Eliminar grupo {{ g.nombre }}?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
