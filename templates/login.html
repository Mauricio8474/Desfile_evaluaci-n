{% extends "base.html" %}
{% block title %}Ingresar - Evaluación Hilos de la Tierra{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-badge display-4 text-usm"></i>
                    <h4 class="mt-2">Acceso de Jurados</h4>
                    <p class="text-muted">Selecciona tu perfil para ingresar al sistema</p>
                </div>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Jurado</label>
                        <select name="jurado_id" class="form-select form-select-lg" required>
                            <option value="">— Selecciona un jurado —</option>
                            {% for j in jurados %}
                            <option value="{{ j.id }}">{{ j.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Dejar en blanco si no hay contraseña">
                    </div>
                    <button type="submit" class="btn btn-usm btn-lg w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
